<div class="auth-container">
  <h2>Sign In</h2>
  <p class="page-subtitle auth-sub">Enter your credentials to access the portal</p>
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" class="form-control" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="password" required autocomplete="current-password" class="form-control" />
    </div>
    <p class="error" *ngIf="error">{{ error }}</p>
    <button type="submit" [disabled]="!loginForm.valid || loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>
  </form>
  <p>Don't have an account? <a routerLink="/register">Register</a></p>
</div>
