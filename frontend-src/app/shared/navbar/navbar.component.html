<nav class="navbar">
  <span class="brand">Student Complaint Portal</span>
  <div class="nav-links">
    <ng-container *ngIf="auth.isLoggedIn">
      <a routerLink="/dashboard" *ngIf="!auth.isAdmin" routerLinkActive="active">My Complaints</a>
      <a routerLink="/admin" *ngIf="auth.isAdmin" routerLinkActive="active">Administration</a>
      <a routerLink="/profile" routerLinkActive="active">Profile</a>
    </ng-container>

    <button
      type="button"
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="theme.isDark ? 'Switch to light mode' : 'Switch to dark mode'"
      title="Toggle light / dark mode"
    >
      <svg *ngIf="!theme.isDark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="12" y1="2" x2="12" y2="4"></line>
        <line x1="12" y1="20" x2="12" y2="22"></line>
        <line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
        <line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
        <line x1="2" y1="12" x2="4" y2="12"></line>
        <line x1="20" y1="12" x2="22" y2="12"></line>
        <line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
        <line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
      </svg>
      <svg *ngIf="theme.isDark" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>

    <ng-container *ngIf="auth.isLoggedIn">
      <span class="user-name">{{ auth.currentUser?.name }} · {{ auth.currentUser?.role }}</span>
      <button class="btn-logout" (click)="logout()">Sign Out</button>
    </ng-container>
  </div>
</nav>
