<div class="auth-container">
  <h2>Create Account</h2>
  <p class="page-subtitle auth-sub">Register to submit and manage complaints</p>
  <form (ngSubmit)="onSubmit()" #regForm="ngForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" [(ngModel)]="name" required autocomplete="name" class="form-control" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" [(ngModel)]="email" required autocomplete="email" class="form-control" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" [(ngModel)]="password" required minlength="6" autocomplete="new-password" class="form-control" />
    </div>
    <div class="form-group">
      <label>Role</label>
      <select name="role" [(ngModel)]="role" class="form-control">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="form-group" *ngIf="role === 'student'">
      <label>Student ID</label>
      <input type="text" name="studentId" [(ngModel)]="studentId" class="form-control" />
    </div>
    <div class="form-group">
      <label>Department</label>
      <input type="text" name="department" [(ngModel)]="department" class="form-control" />
    </div>
    <p class="error" *ngIf="error">{{ error }}</p>
    <button type="submit" [disabled]="!regForm.valid || loading">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>
  </form>
  <p>Already have an account? <a routerLink="/login">Login</a></p>
</div>
